# ──────────────────────────────────────────────
# General
# ──────────────────────────────────────────────
set -g mouse on
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g default-shell /bin/zsh
set -g base-index 1
setw -g pane-base-index 1

# Change prefix from Ctrl+B to Ctrl+A (Ctrl+B conflicts with nvim)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ──────────────────────────────────────────────
# Keybindings (Unicode PUA chars from Ghostty)
# ──────────────────────────────────────────────

# Pane/tab management
bind -n  split-window -h -c "#{pane_current_path}"   # Cmd+E: new pane right
bind -n  split-window -v -c "#{pane_current_path}"   # Cmd+G: new pane down
bind -n  new-window -c "#{pane_current_path}"        # Cmd+N: new tab
bind -n  kill-pane                                     # Cmd+W: close pane
bind -n  next-window                                   # Cmd+Y: next tab

# Navigate between panes with Alt+HJKL (wraps to prev/next window at edges)
bind -n M-h if-shell -F '#{pane_at_left}' 'previous-window' 'select-pane -L'
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l if-shell -F '#{pane_at_right}' 'next-window' 'select-pane -R'

# Resize panes with Alt+Arrow
bind -n M-Up resize-pane -U 2
bind -n M-Right resize-pane -R 2
bind -n M-Down resize-pane -D 2
bind -n M-Left resize-pane -L 2

# Toggle floating popup (Alt+F) — tmux 3.2+
# Uses a named session so Alt+F inside the popup detaches it (toggle behavior)
bind -n M-f if-shell -F '#{==:#{session_name},scratch}' { detach-client } { display-popup -E -w 80% -h 80% -d '#{pane_current_path}' 'tmux new-session -A -s scratch' }

# ──────────────────────────────────────────────
# Rose Pine theme (status bar)
# ──────────────────────────────────────────────
set -g status-style "bg=#403d52,fg=#e0def4"
set -g pane-border-style "fg=#403d52"
set -g pane-active-border-style "fg=#31748f"
set -g message-style "bg=#403d52,fg=#e0def4"
set -g status-left "#[fg=#e0def4,bg=#26233a] #S #[default] "
set -g status-right "#[fg=#e0def4,bg=#26233a] %H:%M "
set -g window-status-current-style "fg=#f6c177,bold"
