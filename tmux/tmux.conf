# ──────────────────────────────────────────────
# General
# ──────────────────────────────────────────────
set -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g default-shell /bin/zsh
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

# Prefix: Ctrl+A (Ctrl+B conflicts with nvim)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reload config
bind q source-file ~/.config/tmux/tmux.conf

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ──────────────────────────────────────────────
# Keybindings (Unicode PUA chars from Ghostty)
# ──────────────────────────────────────────────

bind -n  split-window -h -c "#{pane_current_path}"   # Super+E: new pane right
bind -n  split-window -v -c "#{pane_current_path}"   # Super+G: new pane down
bind -n  new-window -c "#{pane_current_path}"        # Super+N: new tab
bind -n  kill-pane                                     # Super+W: close pane
bind -n  next-window                                   # Super+Y: next tab

# Navigate between panes with Alt+HJKL (wraps to prev/next window at edges)
bind -n M-h if-shell -F '#{pane_at_left}' 'previous-window' 'select-pane -L'
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l if-shell -F '#{pane_at_right}' 'next-window' 'select-pane -R'

# Resize panes with Alt+Arrow
bind -n M-Up resize-pane -U 2
bind -n M-Right resize-pane -R 2
bind -n M-Down resize-pane -D 2
bind -n M-Left resize-pane -L 2

# Toggle floating popup (Alt+F) — tmux 3.2+
# Uses a named session so Alt+F inside the popup detaches it (toggle behavior)
bind -n M-f if-shell -F '#{==:#{session_name},scratch}' { detach-client } { display-popup -E -w 80% -h 80% -d '#{pane_current_path}' 'tmux new-session -A -s scratch' }

# ──────────────────────────────────────────────
# Theme (uses terminal colors — follows omarchy theme)
# ──────────────────────────────────────────────
set -g status-position top
set -g status-interval 2
set -g status-left-length 40
set -g status-right-length 80
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}'

set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=blue,bold] #S #[bg=default] "
set -g status-right "#[fg=blue]#{?client_prefix, PREFIX ,}#{?window_zoomed_flag, ZOOM ,}#[fg=brightblack]#{pane_current_path} "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W #[fg=default]"
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue
